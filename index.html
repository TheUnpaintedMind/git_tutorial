<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    table,th,td{
        border:1px solid black;
        border-collapse:collapse;
        text-align: center;
    }
    </style>
    <title>Document</title>
</head>
<body>
    <table>
        <tr>
            <th colspan="2">Sr no</th>
            <th>Line</th>
            <th>Description</th>
        </tr>
        <tr>
            <td colspan="2">1.</td>
            <td>#include &lt;stdio.h&gt;</td>
            <td>Header</td>
        </tr>
        <tr>
            <td colspan="2">2.</td>
            <td>int main(void)</td>
            <td>Main</td>
        </tr>
        <tr>
            <td rowspan="5">BODY</td>
            <td>3.</td>
            <td>{</td>
            <td>Opening Block</td>
        </tr>
        <tr>
            <td>4.</td>
            <td>//This is a single line comment</td>
            <td>Single line comment</td>
        </tr>
        <tr>
            <td>5.</td>
            <td>printf("Hello World")</td>
            <td>Print Statement</td>
        </tr>
        <tr>
            <td>6.</td>
            <td>return 0;</td>
            <td>Return statement</td>
        </tr>
        <tr>
            <td>7.</td>
            <td>}</td>
            <td>Closing Block</td>
        </tr>
        
        
    </table>
    
</body>
</html>
